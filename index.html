<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <h1 class="title">Pará Sorvetes</h1>
        <h4>Melhor sorveteria da cidade</h4>
    </header>

    <main>
        <div id="container" class="container"></div>
        <div id="container2" class="container2">
            <h3 class="pedido-title">Seu Pedido</h3>
            <div id="pedido" class="pedido">
                <div class="pedido-div">
                    <span class="pedido-span">
                        <h4>PIZZOKKIE</h4>
                        <button class="remove-btn">-</button>
                    </span>
                    <h4>25$</h4>
                </div>
            </div>
            <div class="preco-div">
                <h3>TOTAL: </h3>
                <h3 id="preco-final">99$</h3>
            </div>
            <button id="submit-btn" class="submit-btn">COMPLETAR PEDIDO</button>
        </div>
        <div id="pagamento" class="pagamento">
            <button id="close-modal" class="close-modal">x</button>
            <form id="form" action="" class="pay-form">
                <input required class="pay-inp" type="email" placeholder="alice@gmail.com">
                <input required class="pay-inp" type="text" placeholder="numero do cartão" minlength="16" maxlength="16" inputmode="numeric" pattern="\d{16}">
                <input required class="pay-inp" type="text" placeholder="CVV" maxlength="3" minlength="3" inputmode="numeric" pattern="\d{3}">
                <button id="submit-form" class="submit-form">submit</button>
            </form>
        </div>
    </main>

    <script src="script.js" type="module"></script>
</body>
</html>
